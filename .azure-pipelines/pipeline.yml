trigger: none
pr: none

# Azure Pipelines schedules use UTC; every 8 hours on the hour stays aligned in
# AWST because it is UTC+8.
schedules:
- cron: '0 */8 * * *'
  displayName: Every 8 hours on the hour
  branches:
    include:
    - main
  always: true
  batch: true

pool:
  vmImage: ubuntu-latest

variables:
- group: shared-officespace-prod

# The shared-officespace-prod variable group supplies environment-specific
# values such as AZURE_SERVICE_CONNECTION, KEY_VAULT_NAME,
# KEY_VAULT_AUTH_CONFIG_SECRET, and the OFFICESPACE_* booking/auth
# overrides. The Azure service connection needs Key Vault secret get/list/set
# access. The pipeline installs the local `officespace` package and invokes the
# `officespace-runner` console script from that package. It stores the full
# auth.json payload in Key Vault and hydrates OFFICESPACE_AUTH_CONFIG_FILE from
# that secret before each run, so the pipeline does not need officespace.toml.
- name: PYTHON_VERSION
  value: '3.12'
- name: OFFICESPACE_MODE
  value: book
- name: OFFICESPACE_AUTH_CONFIG_FILE
  value: $(Agent.TempDirectory)/officespace-auth.json

steps:
- checkout: self

- task: UsePythonVersion@0
  displayName: Use Python $(PYTHON_VERSION)
  inputs:
    versionSpec: $(PYTHON_VERSION)

- bash: |
    set -euo pipefail

    sudo apt-get update
    sudo apt-get install -y libzbar0
  displayName: Install system dependencies

- bash: |
    set -euo pipefail

    python -m pip install --upgrade pip
    python -m pip install -e .
  displayName: Install Python dependencies

- task: AzureCLI@2
  displayName: Download OfficeSpace auth.json from Key Vault
  inputs:
    azureSubscription: $(AZURE_SERVICE_CONNECTION)
    scriptType: bash
    scriptLocation: inlineScript
    inlineScript: |
      set -euo pipefail

      auth_config_secret_id="$(az keyvault secret show \
        --vault-name "$KEY_VAULT_NAME" \
        --name "$KEY_VAULT_AUTH_CONFIG_SECRET" \
        --query id \
        -o tsv 2>/dev/null || true)"

      if [[ -n "$auth_config_secret_id" ]]; then
        az keyvault secret show \
          --id "$auth_config_secret_id" \
          --query value \
          -o tsv > "$OFFICESPACE_AUTH_CONFIG_FILE"
      else
        echo "Key Vault secret $KEY_VAULT_AUTH_CONFIG_SECRET was not found in $KEY_VAULT_NAME." >&2
        exit 1
      fi

- bash: |
    set -euo pipefail

    officespace-runner

    if [[ ! -s "$OFFICESPACE_AUTH_CONFIG_FILE" ]]; then
      echo "Auth config file $OFFICESPACE_AUTH_CONFIG_FILE was not written." >&2
      exit 1
    fi
  displayName: Run officespace-runner

- task: AzureCLI@2
  displayName: Upload OfficeSpace auth.json to Key Vault
  inputs:
    azureSubscription: $(AZURE_SERVICE_CONNECTION)
    scriptType: bash
    scriptLocation: inlineScript
    inlineScript: |
      set -euo pipefail

      az keyvault secret set \
        --vault-name "$KEY_VAULT_NAME" \
        --name "$KEY_VAULT_AUTH_CONFIG_SECRET" \
        --file "$OFFICESPACE_AUTH_CONFIG_FILE" \
        --only-show-errors \
        1>/dev/null