  room {
    id
    construct
    label
    points
    publicAttribute
    attributes {
      id
      value
      template {
        id
        name
      }
    }
  }
  seatAvailability {
    id
    firstDayOfWeek
    name
    schedule
    type
  }
  seatPermissionEmployees {
    ...EmployeeResourceInfo
    ...InfoCardEmployeeExclusiveDesks
  }
  seatPermissionOccupancyPolicy {
    id
    name
  }
  site {
    id
    calendarStartDay
    deskBookableUntil
    name
    timeZone
    endsOfDay
    operatingWeekDays
    startsOfDay
  }
  shifts {
    ...ShiftDetails
  }
