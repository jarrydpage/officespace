trigger: none
pr: none

# Azure Pipelines schedules use UTC; AWST stays at :01 because it is UTC+8.
schedules:
- cron: '1 * * * *'
  displayName: Hourly at :01
  branches:
    include:
    - main
  always: true
  batch: true

pool:
  vmImage: ubuntu-latest

variables:
# Replace these with your Azure resource names.
# The Azure service connection needs Key Vault secret get/list/set access.
# The pipeline stores the full auth.json payload in Key Vault and hydrates
# OFFICESPACE_AUTH_CONFIG_FILE from that secret before each run.
- name: PYTHON_VERSION
  value: '3.12'
- name: AZURE_SERVICE_CONNECTION
  value: arm-coreservices-prod
- name: KEY_VAULT_NAME
  value: zaekvpcs0001
- name: AUTH_CONFIG_SECRET_NAME
  value: officespace-auth-json
- name: OFFICESPACE_MODE
  value: book
- name: OFFICESPACE_AUTH_CONFIG_FILE
  value: $(Agent.TempDirectory)/officespace-auth.json

steps:
- checkout: self

- task: UsePythonVersion@0
  displayName: Use Python $(PYTHON_VERSION)
  inputs:
    versionSpec: $(PYTHON_VERSION)

- bash: |
    set -euo pipefail

    sudo apt-get update
    sudo apt-get install -y libzbar0
  displayName: Install system dependencies

- bash: |
    set -euo pipefail

    python -m pip install --upgrade pip
    python -m pip install -r requirements.txt
  displayName: Install Python dependencies

- task: AzureCLI@2
  displayName: Download OfficeSpace auth.json from Key Vault
  inputs:
    azureSubscription: $(AZURE_SERVICE_CONNECTION)
    scriptType: bash
    scriptLocation: inlineScript
    inlineScript: |
      set -euo pipefail

      auth_config_secret_id="$(az keyvault secret show \
        --vault-name "$KEY_VAULT_NAME" \
        --name "$AUTH_CONFIG_SECRET_NAME" \
        --query id \
        -o tsv 2>/dev/null || true)"

      if [[ -n "$auth_config_secret_id" ]]; then
        az keyvault secret show \
          --id "$auth_config_secret_id" \
          --query value \
          -o tsv > "$OFFICESPACE_AUTH_CONFIG_FILE"
      else
        echo "Key Vault secret $AUTH_CONFIG_SECRET_NAME was not found in $KEY_VAULT_NAME." >&2
        exit 1
      fi

- bash: |
    set -euo pipefail

    python run.py

    if [[ ! -s "$OFFICESPACE_AUTH_CONFIG_FILE" ]]; then
      echo "Auth config file $OFFICESPACE_AUTH_CONFIG_FILE was not written." >&2
      exit 1
    fi
  displayName: Run OfficeSpace booking script

- task: AzureCLI@2
  displayName: Upload OfficeSpace auth.json to Key Vault
  inputs:
    azureSubscription: $(AZURE_SERVICE_CONNECTION)
    scriptType: bash
    scriptLocation: inlineScript
    inlineScript: |
      set -euo pipefail

      az keyvault secret set \
        --vault-name "$KEY_VAULT_NAME" \
        --name "$AUTH_CONFIG_SECRET_NAME" \
        --file "$OFFICESPACE_AUTH_CONFIG_FILE" \
        --only-show-errors \
        1>/dev/null